<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Google</title>
<style>
body{margin:0;font-family:monospace;background:#000;color:#0f0;text-align:center;}
#topBar{position:fixed;top:0;left:0;width:100%;background:#111;padding:10px;box-shadow:0 0 20px #0f0;z-index:1000;}
#topBar h1{margin:0;color:#0f0;}
#main{margin-top:140px;padding:20px;}
input,button{font-family:monospace;}
input,select{background:#111;color:#0f0;border:1px solid #0f0;padding:6px;margin:5px;}
button{background:black;color:#0f0;border:1px solid #0f0;padding:6px 12px;cursor:pointer;}
button:hover{background:#0f0;color:#000;}
#progressContainer{width:90%;margin:10px auto;background:#111;border:1px solid #0f0;height:20px;position:relative;}
#progressBar{width:0%;height:100%;background:#0f0;}
#progressText{position:absolute;width:100%;top:0;left:0;font-size:12px;line-height:20px;}
#log{max-width:90%;height:150px;overflow:auto;border:1px solid #0f0;margin:10px auto;text-align:left;padding:8px;background:black;}
ul{list-style:none;padding:0;margin:10px auto;max-width:90%;text-align:left;border:1px solid #0f0;background:#111;max-height:300px;overflow:auto;}
.node{cursor:pointer;}
.success{color:#0f0;}
.failed{color:#f00;}
.skipped{color:#ff0;}
.retryBtn{color:#f00;border:1px solid #f00;padding:2px 4px;margin-left:5px;font-size:11px;cursor:pointer;}
textarea{width:90%;height:200px;background:#000;color:#0f0;border:1px solid #0f0;padding:6px;margin-top:5px;resize:vertical;}
#htmlControls{margin-top:5px;display:flex;gap:8px;justify-content:center;}
</style>
</head>
<body>

<div id="topBar"><h1>Link Viewer</h1></div>
<div id="main">
<input id="urlInput" placeholder="https://example.com" size="50">
<label><input type="checkbox" id="sameDomain" checked> Only this site</label>
<br>
<button id="startBtn">Start Crawl</button>
<button id="pauseBtn">Pause</button>
<button id="resumeBtn">Resume</button>
<button id="stopBtn">Stop</button>
<button id="exportBtn">Export Links</button>
<button id="exportJsonBtn">Export Sitemap JSON</button>
<br>
<input id="search" placeholder="Search links">
<div id="progressContainer"><div id="progressBar"></div><div id="progressText">0%</div></div>
<pre id="log"></pre>
<ul id="tree"></ul>
<ul id="links"></ul>

<div id="htmlViewer">
<div id="htmlControls">
<button id="previewBtn">Preview</button>
<button id="copyBtn">Copy</button>
<button id="downloadBtn">Download</button>
</div>
<textarea id="rawHTML" placeholder="Raw HTML will appear here"></textarea>
<iframe id="preview"></iframe>
</div>

<script>
const PROXY="/api/proxy?url=";
const urlInput=document.getElementById("urlInput");
const startBtn=document.getElementById("startBtn");
const pauseBtn=document.getElementById("pauseBtn");
const resumeBtn=document.getElementById("resumeBtn");
const stopBtn=document.getElementById("stopBtn");
const exportBtn=document.getElementById("exportBtn");
const exportJsonBtn=document.getElementById("exportJsonBtn");
const sameDomainChk=document.getElementById("sameDomain");
const progressBar=document.getElementById("progressBar");
const progressText=document.getElementById("progressText");
const logBox=document.getElementById("log");
const tree=document.getElementById("tree");
const linksList=document.getElementById("links");
const search=document.getElementById("search");
const rawHTML=document.getElementById("rawHTML");
const preview=document.getElementById("preview");
const previewBtn=document.getElementById("previewBtn");
const copyBtn=document.getElementById("copyBtn");
const downloadBtn=document.getElementById("downloadBtn");

let visited=new Set(),queue=[],running=false,paused=false,allLinks=[],sitemap={};

function log(msg){logBox.textContent+="["+new Date().toLocaleTimeString()+"] "+msg+"\n";logBox.scrollTop=logBox.scrollHeight;}
function normalize(u){try{let url=new URL(u);url.hash="";return url.href}catch{return null}}
async function fetchPage(url){try{const res=await fetch(PROXY+encodeURIComponent(url));if(!res.ok)return{ok:false,error:res.status};const html=await res.text();return{ok:true,html}}catch(e){return{ok:false,error:e.message}}}
function extract(html,base){
    const doc=new DOMParser().parseFromString(html,"text/html");
    let out=[];
    doc.querySelectorAll("a[href]").forEach(a=>{try{out.push(new URL(a.getAttribute("href"),base).href)}catch{}});
    doc.querySelectorAll("iframe[src]").forEach(f=>{try{out.push(new URL(f.getAttribute("src"),base).href)}catch{}});
    html.replace(/https?:\/\/[^\s"'<>\)]+/g,m=>out.push(new URL(m,base).href));
    return Array.from(new Set(out));
}
function updateProgress(done,total){let p=Math.min(100,Math.floor(done/total*100));progressBar.style.width=p+"%";progressText.textContent=p+"% ("+done+"/"+total+")";}
function renderLinks(list){
    linksList.innerHTML="";
    list.forEach(url=>{
        let li=document.createElement("li");
        let a=document.createElement("a"); a.href=url; a.textContent=url; a.target="_blank";
        let view=document.createElement("button"); view.textContent="View HTML";
        view.onclick=async ()=>{
            rawHTML.value="Fetching... "+url;
            let r=await fetchPage(url);
            rawHTML.value=r.ok?r.html:"<!-- Error fetching -->";
            preview.src=url;
        };
        li.appendChild(a); li.appendChild(view);
        linksList.appendChild(li);
    });
}
function renderTreeNode(url,status,parent){
    let li=document.createElement("li");
    let span=document.createElement("span");
    span.textContent="▶ "+url; span.className="node "+status;
    let childUL=document.createElement("ul"); childUL.style.display="none";
    span.onclick=()=>{childUL.style.display=childUL.style.display==="none"?"block":"none";};
    li.appendChild(span); li.appendChild(childUL);
    if(parent){parent.appendChild(li);}else{tree.appendChild(li);}
    return {childUL,span};
}

async function crawl(){
    running=true; queue=[]; visited.clear(); tree.innerHTML=""; linksList.innerHTML=""; allLinks=[]; sitemap={};
    let root=urlInput.value.trim(); if(!root.startsWith("http")) root="https://"+root;
    const rootHost=new URL(root).hostname;
    queue.push({url:root,parent:null,nodeRef:sitemap});
    let done=0;
    const maxConcurrent=3;
    while((queue.length>0 || running) && running){
        if(paused){await new Promise(r=>setTimeout(r,200)); continue;}
        let batch=queue.splice(0,maxConcurrent);
        await Promise.all(batch.map(async item=>{
            let url=normalize(item.url); if(!url || visited.has(url)) return;
            visited.add(url); log("Crawling "+url);
            if(!item.nodeRef[url]) item.nodeRef[url]={children:{},status:"failed"};
            let nodeElements=renderTreeNode(url,"failed",item.parent); 
            let result=await fetchPage(url);
            if(result.ok){
                item.nodeRef[url].status="success";
                let links=extract(result.html,url);
                links.forEach(l=>{
                    if(!visited.has(l) && (!sameDomainChk.checked || new URL(l).hostname===rootHost)){
                        queue.push({url:l,parent:nodeElements.childUL,nodeRef:item.nodeRef[url].children});
                    }
                    if(!allLinks.includes(l)) allLinks.push(l);
                });
            }else{
                let retryBtn=document.createElement("span"); retryBtn.textContent="Retry"; retryBtn.className="retryBtn";
                retryBtn.onclick=()=>{queue.push({url:item.url,parent:item.parent,nodeRef:item.nodeRef}); crawl();};
                nodeElements.childUL.appendChild(retryBtn);
                log("Error "+result.error);
            }
            done++; updateProgress(done,done+queue.length); renderLinks(allLinks);
            await new Promise(r=>setTimeout(r,100));
        }));
    }
    progressBar.style.width="100%"; progressText.textContent="100% ("+allLinks.length+"/"+allLinks.length+")";
    log("Crawl finished");
}

startBtn.onclick=()=>{crawl();}
pauseBtn.onclick=()=>{paused=true; log("Paused");}
resumeBtn.onclick=()=>{paused=false; log("Resumed");}
stopBtn.onclick=()=>{running=false; log("Stopped");}
exportBtn.onclick=()=>{let blob=new Blob([allLinks.join("\n")]);let a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="links.txt";a.click();}
exportJsonBtn.onclick=()=>{let blob=new Blob([JSON.stringify(sitemap,null,2)]);let a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="sitemap.json";a.click();}
search.oninput=()=>{let q=search.value.toLowerCase(); renderLinks(allLinks.filter(l=>l.toLowerCase().includes(q)));};

previewBtn.onclick=()=>{let w=window.open('about:blank'); w.document.open(); w.document.write(rawHTML.value||''); w.document.close(); w.focus();}
copyBtn.onclick=()=>{navigator.clipboard.writeText(rawHTML.value||'').then(()=>{copyBtn.textContent='Copied!';setTimeout(()=>copyBtn.textContent='Copy',1200);});}
downloadBtn.onclick=()=>{let blob=new Blob([rawHTML.value||''],{type:'text/html'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='page.html';a.click();}
</script>
</body>
</html>
