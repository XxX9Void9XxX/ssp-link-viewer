<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Google</title>
<style>
body { margin:0; font-family:monospace; background:#000; color:#0f0; text-align:center;}
#topBar { position:fixed; top:0; left:0; width:100%; background:#111; padding:10px 0; z-index:1000; box-shadow:0 0 20px #0f0;}
#topBar h1 { margin:0; color:#0f0; text-shadow:0 0 10px #0f0,0 0 20px #0a0;}
#mainContent { margin-top:110px; padding:20px;}
input, button { font-family:monospace; background:#111; color:#0f0; border:1px solid #0f0; padding:6px; margin:5px;}
button:hover { background:#0f0; color:#000; cursor:pointer;}
pre#log { text-align:left; max-width:90%; margin:20px auto; background:#000; padding:15px; border:1px solid #0f0; height:150px; overflow-y:auto; border-radius:4px; }
ul#linkList { list-style:none; padding:0; margin:20px auto; max-width:90%; text-align:left; color:#0f0; background:#111; border:1px solid #0f0; border-radius:4px; max-height:300px; overflow-y:auto; }
ul#linkList li { margin:5px 0; }
ul#linkList li a { color:#0f0; text-decoration:none; }
ul#linkList li button { margin-left:8px; background:transparent;color:#0f0;border:1px solid #0f0;padding:2px 6px; font-size:12px;}
.controls { display:flex; gap:8px; justify-content:center; align-items:center; flex-wrap:wrap; margin:8px 0 12px 0; }
.modeBtn { background:rgba(0,0,0,0.3); color:#0f0; border:1px solid #0f0; padding:6px 10px; border-radius:6px; cursor:pointer; }
.modeBtn.active { background:#0f0; color:#001; font-weight:700; }
.viewer { max-width:90%; margin:10px auto; text-align:left; display:none; }
textarea#rawText { width:100%; min-height:220px; background:#000; color:#0f0; border:1px solid #0f0; padding:8px; border-radius:6px; resize:vertical; }
#progressContainer{width:90%;margin:10px auto;background:#111;border:1px solid #0f0;height:20px;position:relative;}
#progressBar{width:0%;height:100%;background:#0f0;}
#progressText{position:absolute;width:100%;top:0;left:0;font-size:12px;line-height:20px;}
.retryBtn{color:#f00;border:1px solid #f00;padding:2px 4px;margin-left:5px;font-size:11px;cursor:pointer;}
#downloadAllBtn{background:transparent;color:#0f0;border:2px solid #0f0;padding:6px 10px;margin:5px;}
#downloadAllBtn:hover{background:#0f0;color:#000;}
</style>
</head>
<body>
<div id="topBar"><h1>Link Viewer</h1></div>
<div id="mainContent">
  <input id="seed" type="text" placeholder="Enter URL (https://...)" size="60">
  <label><input type="checkbox" id="sameDomain" checked> Only this site</label>
  <div class="controls">
    <button id="crawlBtn" class="modeBtn">Crawl</button>
    <button id="viewBtn" class="modeBtn">View HTML</button>
    <button id="downloadAllBtn">Download All Links</button>
    <input id="filter" type="text" placeholder="Search links" size="30">
  </div>
  <div id="progressContainer"><div id="progressBar"></div><div id="progressText">0%</div></div>
  <pre id="log"></pre>
  <ul id="linkList"></ul>
  <div id="htmlViewer" class="viewer">
    <div style="display:flex; gap:8px; align-items:center;" id="htmlControls">
      <button id="previewTab" class="modeBtn">Preview</button>
      <button id="copyBtn" class="modeBtn">Copy</button>
      <button id="downloadBtn" class="modeBtn">Download</button>
    </div>
    <textarea id="rawText" placeholder="Raw HTML will appear here"></textarea>
  </div>
</div>

<script>
const PROXY="/api/proxy?url=";
const seedInput=document.getElementById('seed');
const crawlBtn=document.getElementById('crawlBtn');
const viewBtn=document.getElementById('viewBtn');
const downloadAllBtn=document.getElementById('downloadAllBtn');
const logEl=document.getElementById('log');
const linkListEl=document.getElementById('linkList');
const filterInput=document.getElementById('filter');
const htmlViewer=document.getElementById('htmlViewer');
const rawText=document.getElementById('rawText');
const previewTab=document.getElementById('previewTab');
const copyBtn=document.getElementById('copyBtn');
const downloadBtn=document.getElementById('downloadBtn');
const sameDomainChk=document.getElementById('sameDomain');
const progressBar=document.getElementById('progressBar');
const progressText=document.getElementById('progressText');

let allLinks=[], visited=new Set(), queue=[], totalCount=0, activeFetches=0, MAX_CONCURRENT=5;

function log(msg){ logEl.textContent+=msg+"\n"; logEl.scrollTop=logEl.scrollHeight; }
function normalizeUrl(url){ try{ const u=new URL(url); u.hash=""; return u.href; } catch { return null; } }
async function fetchHtml(url){ try { const res=await fetch(PROXY + encodeURIComponent(url)); if(!res.ok) return {ok:false,error:res.status}; const html=await res.text(); return {ok:true,html}; } catch(e){ return {ok:false,error:e.message}; } }
function extractLinks(html,base){ const doc=new DOMParser().parseFromString(html,"text/html"); const links=new Set(); doc.querySelectorAll("a[href],iframe[src]").forEach(a=>{ try{ const u=new URL(a.getAttribute("href")||a.getAttribute("src"),base).href; links.add(u); } catch{} }); return Array.from(links); }

function renderLinkList(list){
  linkListEl.innerHTML="";
  list.forEach(url=>{
    const li=document.createElement('li');
    const a=document.createElement('a'); a.href=url; a.textContent=url; a.target="_blank";
    const viewBtn=document.createElement('button'); viewBtn.textContent='View HTML';
    viewBtn.onclick=async()=>{ htmlViewer.style.display='block'; rawText.value="Fetching..."; const r=await fetchHtml(url); rawText.value=r.ok?r.html:"<!-- Error fetching -->"; };
    const txtBtn=document.createElement('button'); txtBtn.textContent='Download TXT';
    txtBtn.onclick=()=>{ const blob=new Blob([url],{type:'text/plain'}); const aEl=document.createElement('a'); aEl.href=URL.createObjectURL(blob); aEl.download='link.txt'; aEl.click(); };
    li.appendChild(a); li.appendChild(viewBtn); li.appendChild(txtBtn);
    linkListEl.appendChild(li);
  });
}

filterInput.addEventListener("input",()=>{ const q=filterInput.value.toLowerCase(); renderLinkList(allLinks.filter(u=>u.toLowerCase().includes(q))); });

async function processQueue(rootHost){
  while(queue.length>0 && activeFetches<MAX_CONCURRENT){
    const url=queue.shift(); const n=normalizeUrl(url); if(!n || visited.has(n)) continue;
    visited.add(n); activeFetches++; log("Crawling: "+n);
    fetchHtml(n).then(r=>{
      if(r.ok){
        const links=extractLinks(r.html,n);
        for(const l of links){
          if(!visited.has(l) && (!sameDomainChk.checked || new URL(l).hostname===rootHost)) queue.push(l);
          if(!allLinks.includes(l)) allLinks.push(l);
        }
      } else { queue.push(n); }
    }).finally(()=>{
      activeFetches--;
      updateProgress();
      renderLinkList(allLinks);
      processQueue(rootHost);
    });
  }
}

function updateProgress(){
  const processed=visited.size;
  const pct=totalCount>0?Math.floor((processed/allLinks.length)*100):0;
  progressBar.style.width=pct+"%";
  progressText.textContent=`${pct}% (${processed}/${allLinks.length})`;
}

async function crawl(seed){
  if(!seed.startsWith('http')) seed='https://'+seed;
  const rootHost=new URL(seed).hostname;
  visited.clear(); queue=[seed]; allLinks=[]; totalCount=1; logEl.textContent=''; 
  processQueue(rootHost);
}

// Mode buttons trigger directly
crawlBtn.onclick=()=>{ const seed=seedInput.value.trim(); if(!seed){alert('Enter URL'); return;} crawl(seed); };
viewBtn.onclick=async()=>{ const seed=seedInput.value.trim(); if(!seed){alert('Enter URL'); return;} htmlViewer.style.display='block'; rawText.value="Fetching..."; const r=await fetchHtml(seed); rawText.value=r.ok?r.html:"<!-- Error fetching -->"; };

// HTML viewer buttons
previewTab.onclick=()=>{ const w=window.open('about:blank'); w.document.open(); w.document.write(rawText.value||''); w.document.close(); w.focus(); };
copyBtn.onclick=async()=>{ try { await navigator.clipboard.writeText(rawText.value||''); copyBtn.textContent='Copied!'; setTimeout(()=>copyBtn.textContent='Copy',1200); } catch(e){alert('Copy failed: '+e);} };
downloadBtn.onclick=()=>{ const blob=new Blob([rawText.value||''],{type:'text/html'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='page.html'; a.click(); };

// Download all links
downloadAllBtn.onclick=()=>{ 
  if(allLinks.length===0){alert('No links to download'); return;}
  const blob=new Blob([allLinks.join('\n')],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='all_links.txt';
  a.click();
};

seedInput.addEventListener('keydown',e=>{if(e.key==='Enter') crawlBtn.click();});
</script>
</body>
</html>
